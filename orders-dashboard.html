<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單管理 + 分析儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1A1A18;
        }
        
        .time-filter {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .time-filter select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1A1A18;
            margin-bottom: 8px;
        }
        
        .stat-detail {
            font-size: 12px;
            color: #666;
        }
        
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: 700;
            color: #1A1A18;
            margin-bottom: 15px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .top-products {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .section-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1A1A18;
        }
        
        .product-list {
            padding: 0;
        }
        
        .product-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        
        .product-item:last-child {
            border-bottom: none;
        }
        
        .product-name {
            font-weight: 600;
            color: #1A1A18;
        }
        
        .product-qty {
            text-align: right;
            color: #666;
        }
        
        .product-amount {
            text-align: right;
            font-weight: 600;
            color: #FF9800;
        }
        
        .product-rank {
            text-align: right;
            font-size: 12px;
            color: #999;
        }
        
        .orders-section {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .orders-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .orders-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .order-item {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr 1fr;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            align-items: center;
            font-size: 13px;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-id {
            font-weight: 600;
            color: #1A1A18;
        }
        
        .order-customer {
            color: #1A1A18;
        }
        
        .order-phone {
            color: #666;
            font-size: 12px;
        }
        
        .order-type {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }
        
        .order-type.person {
            background: #E3F2FD;
            color: #1565C0;
        }
        
        .order-type.company {
            background: #FFF3E0;
            color: #E65100;
        }
        
        .order-repeat {
            text-align: center;
        }
        
        .repeat-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .repeat-badge.new {
            background: #E8F5E9;
            color: #2E7D32;
        }
        
        .repeat-badge.repeat {
            background: #FCE4EC;
            color: #C2185B;
        }
        
        .order-amount {
            text-align: right;
            font-weight: 600;
            color: #FF9800;
        }
        
        .order-date {
            text-align: right;
            color: #666;
            font-size: 12px;
        }
        
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .chart-row {
                grid-template-columns: 1fr;
            }
            
            .product-item,
            .order-item {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📦 訂單管理 + 分析儀表板</div>
            <div class="time-filter">
                <label style="font-size: 14px; color: #666;">篩選時間：</label>
                <select id="timeFilter" onchange="updateDashboard()">
                    <option value="month">本月</option>
                    <option value="quarter">本季</option>
                    <option value="year">本年度</option>
                    <option value="all">全部</option>
                </select>
            </div>
        </header>
        
        <!-- 關鍵指標 -->
        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-label">📊 總訂單數</div>
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-detail" id="totalOrdersDetail">本月訂單</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">💰 總營收</div>
                <div class="stat-value" id="totalRevenue">NT$0</div>
                <div class="stat-detail" id="totalRevenueDetail">本月營收</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">🔄 重複客戶比</div>
                <div class="stat-value" id="repeatRate">0%</div>
                <div class="stat-detail" id="repeatRateDetail">本月重複購買</div>
            </div>
        </div>
        
        <!-- 圖表區 -->
        <div class="chart-row">
            <!-- 法人 vs 個人 -->
            <div class="chart-card">
                <div class="chart-title">法人 vs 個人</div>
                <div class="chart-container">
                    <canvas id="customerTypeChart"></canvas>
                </div>
                <div style="margin-top: 15px; font-size: 12px; color: #666;">
                    <div style="margin-bottom: 5px;">法人：<span id="companyCount">0</span> 筆</div>
                    <div>個人：<span id="personCount">0</span> 筆</div>
                </div>
            </div>
            
            <!-- 重複客戶分佈 -->
            <div class="chart-card">
                <div class="chart-title">客戶分類</div>
                <div class="chart-container">
                    <canvas id="customerSegmentChart"></canvas>
                </div>
                <div style="margin-top: 15px; font-size: 12px; color: #666;">
                    <div style="margin-bottom: 5px;">🆕 新客：<span id="newCustomerCount">0</span> 位</div>
                    <div style="margin-bottom: 5px;">🔄 回客：<span id="repeatCustomerCount">0</span> 位</div>
                    <div>⭐ 常客：<span id="vipCustomerCount">0</span> 位</div>
                </div>
            </div>
        </div>
        
        <!-- 產品熱銷排行 -->
        <div class="top-products">
            <div class="section-header">
                <div class="section-title">🏆 產品熱銷排行 TOP 10</div>
            </div>
            <div class="product-list" id="productList">
                <!-- 動態插入 -->
            </div>
        </div>
        
        <!-- 最近訂單 -->
        <div class="orders-section">
            <div class="orders-header">
                <div class="section-title">📋 最近訂單</div>
            </div>
            <div class="orders-list" id="ordersList">
                <!-- 動態插入 -->
            </div>
        </div>
    </div>

    <script>
        // 模擬資料
        const mockOrders = [
            { id: 'ORD-001', customer: '王小明', phone: '0912345678', type: 'person', amount: 1500, product: '名片', qty: 1, date: '2026-04-01', repeat: 0 },
            { id: 'ORD-002', customer: '李家豪', phone: '0923456789', type: 'company', amount: 2300, product: '海報', qty: 2, date: '2026-03-28', repeat: 3 },
            { id: 'ORD-003', customer: '陳美伶', phone: '0934567890', type: 'person', amount: 890, product: '貼紙', qty: 5, date: '2026-03-25', repeat: 0 },
            { id: 'ORD-004', customer: '台灣科技', phone: '0225678901', type: 'company', amount: 5600, product: '手冊', qty: 100, date: '2026-03-20', repeat: 0 },
            { id: 'ORD-005', customer: '王小明', phone: '0912345678', type: 'person', amount: 1200, product: '名片', qty: 1, date: '2026-03-15', repeat: 1 },
            { id: 'ORD-006', customer: '美妝工坊', phone: '0267890123', type: 'company', amount: 3400, product: '包裝盒', qty: 50, date: '2026-03-10', repeat: 0 },
            { id: 'ORD-007', customer: '李家豪', phone: '0923456789', type: 'company', amount: 1800, product: '海報', qty: 1, date: '2026-03-05', repeat: 2 },
            { id: 'ORD-008', customer: '黃正宏', phone: '0945678901', type: 'person', amount: 2100, product: '貼紙', qty: 3, date: '2026-02-28', repeat: 0 },
            { id: 'ORD-009', customer: '台灣科技', phone: '0225678901', type: 'company', amount: 4200, product: '手冊', qty: 80, date: '2026-02-20', repeat: 0 },
            { id: 'ORD-010', customer: '王小明', phone: '0912345678', type: 'person', amount: 1500, product: '名片', qty: 1, date: '2026-02-10', repeat: 2 },
        ];
        
        let customerTypeChart, customerSegmentChart;
        
        function updateDashboard() {
            const timeFilter = document.getElementById('timeFilter').value;
            const filteredOrders = filterOrdersByTime(mockOrders, timeFilter);
            
            // 更新關鍵指標
            updateStats(filteredOrders, timeFilter);
            
            // 更新圖表
            updateCharts(filteredOrders);
            
            // 更新產品排行
            updateProductRanking(filteredOrders);
            
            // 更新訂單列表
            updateOrdersList(filteredOrders);
        }
        
        function filterOrdersByTime(orders, timeFilter) {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            
            return orders.filter(order => {
                const orderDate = new Date(order.date);
                const orderMonth = orderDate.getMonth();
                const orderYear = orderDate.getFullYear();
                
                switch(timeFilter) {
                    case 'month':
                        return orderMonth === currentMonth && orderYear === currentYear;
                    case 'quarter':
                        const currentQuarter = Math.floor(currentMonth / 3);
                        const orderQuarter = Math.floor(orderMonth / 3);
                        return orderQuarter === currentQuarter && orderYear === currentYear;
                    case 'year':
                        return orderYear === currentYear;
                    default:
                        return true;
                }
            });
        }
        
        function updateStats(orders, timeFilter) {
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, o) => sum + o.amount, 0);
            const repeatOrders = orders.filter(o => o.repeat > 0).length;
            const repeatRate = totalOrders > 0 ? Math.round((repeatOrders / totalOrders) * 100) : 0;
            
            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalRevenue').textContent = `NT$${totalRevenue.toLocaleString()}`;
            document.getElementById('repeatRate').textContent = `${repeatRate}%`;
            
            const timeText = {
                'month': '本月',
                'quarter': '本季',
                'year': '本年度',
                'all': '全部'
            }[timeFilter];
            
            document.getElementById('totalOrdersDetail').textContent = `${timeText}訂單`;
            document.getElementById('totalRevenueDetail').textContent = `${timeText}營收`;
            document.getElementById('repeatRateDetail').textContent = `${timeText}重複購買`;
        }
        
        function updateCharts(orders) {
            // 法人 vs 個人
            const companyCount = orders.filter(o => o.type === 'company').length;
            const personCount = orders.filter(o => o.type === 'person').length;
            
            document.getElementById('companyCount').textContent = companyCount;
            document.getElementById('personCount').textContent = personCount;
            
            if (customerTypeChart) customerTypeChart.destroy();
            const ctx1 = document.getElementById('customerTypeChart').getContext('2d');
            customerTypeChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['法人', '個人'],
                    datasets: [{
                        data: [companyCount, personCount],
                        backgroundColor: ['#FF9800', '#2196F3'],
                        borderColor: ['#fff', '#fff'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
            
            // 客戶分類
            const newCustomer = orders.filter(o => o.repeat === 0).length;
            const repeatCustomer = orders.filter(o => o.repeat === 1 || o.repeat === 2).length;
            const vipCustomer = orders.filter(o => o.repeat >= 3).length;
            
            document.getElementById('newCustomerCount').textContent = newCustomer;
            document.getElementById('repeatCustomerCount').textContent = repeatCustomer;
            document.getElementById('vipCustomerCount').textContent = vipCustomer;
            
            if (customerSegmentChart) customerSegmentChart.destroy();
            const ctx2 = document.getElementById('customerSegmentChart').getContext('2d');
            customerSegmentChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['🆕 新客', '🔄 回客', '⭐ 常客'],
                    datasets: [{
                        label: '客戶數',
                        data: [newCustomer, repeatCustomer, vipCustomer],
                        backgroundColor: ['#4CAF50', '#FFC107', '#F44336'],
                        borderRadius: 6,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'x',
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }
        
        function updateProductRanking(orders) {
            // 計算產品銷售
            const productStats = {};
            orders.forEach(order => {
                if (!productStats[order.product]) {
                    productStats[order.product] = { qty: 0, amount: 0 };
                }
                productStats[order.product].qty += order.qty;
                productStats[order.product].amount += order.amount;
            });
            
            // 排序（金額）
            const sorted = Object.entries(productStats)
                .map(([name, stats]) => ({
                    name,
                    qty: stats.qty,
                    amount: stats.amount
                }))
                .sort((a, b) => b.amount - a.amount)
                .slice(0, 10);
            
            const html = sorted.map((p, idx) => `
                <div class="product-item">
                    <div class="product-name">#${idx + 1} ${p.name}</div>
                    <div class="product-qty">銷售數量: ${p.qty}</div>
                    <div class="product-amount">NT$${p.amount.toLocaleString()}</div>
                    <div class="product-rank">營收排名 #${idx + 1}</div>
                </div>
            `).join('');
            
            document.getElementById('productList').innerHTML = html || '<div style="padding: 20px; text-align: center; color: #999;">無訂單資料</div>';
        }
        
        function updateOrdersList(orders) {
            const html = orders.slice(0, 20).reverse().map(o => `
                <div class="order-item">
                    <div class="order-id">${o.id}</div>
                    <div>
                        <div class="order-customer">${o.customer}</div>
                        <div class="order-phone">${o.phone}</div>
                    </div>
                    <div class="order-type ${o.type}">${o.type === 'company' ? '法人' : '個人'}</div>
                    <div class="order-repeat">
                        <div class="repeat-badge ${o.repeat === 0 ? 'new' : 'repeat'}">
                            ${o.repeat === 0 ? '🆕 新客' : `🔄 第${o.repeat + 1}次`}
                        </div>
                    </div>
                    <div class="order-amount">NT$${o.amount.toLocaleString()}</div>
                    <div class="order-date">${o.date}</div>
                </div>
            `).join('');
            
            document.getElementById('ordersList').innerHTML = html;
        }
        
        // 初始化
        updateDashboard();
    </script>
</body>
</html>
