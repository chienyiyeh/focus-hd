<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 訂單管理 - FOCUS 看板系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 頂部導航 */
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        
        /* 時間篩選 */
        .filters {
            background: white;
            padding: 15px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .filter-label {
            font-weight: 600;
            color: #64748b;
            margin-right: 10px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            color: #475569;
            font-weight: 500;
        }
        
        .filter-btn:hover {
            background: #e2e8f0;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        /* 統計卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-color, #667eea);
        }
        
        .stat-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .stat-value {
            color: #1e293b;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-change {
            font-size: 12px;
            color: #10b981;
            font-weight: 600;
        }
        
        /* 圖表區塊 */
        .charts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 968px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
        }
        
        .chart-container {
            height: 250px;
            position: relative;
        }
        
        /* 圓餅圖 */
        .pie-chart {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }
        
        .pie-svg {
            width: 200px;
            height: 200px;
        }
        
        .pie-legend {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        
        .legend-label {
            font-size: 14px;
            color: #64748b;
        }
        
        .legend-value {
            font-weight: 600;
            color: #1e293b;
            margin-left: auto;
        }
        
        /* 產品排行榜 */
        .product-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }
        
        .product-item:hover {
            background: #f8fafc;
        }
        
        .product-rank {
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
        
        .product-name {
            flex: 1;
            margin: 0 15px;
            color: #1e293b;
            font-weight: 500;
        }
        
        .product-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .product-qty, .product-revenue {
            font-size: 14px;
            color: #64748b;
        }
        
        .product-revenue {
            font-weight: 600;
            color: #10b981;
        }
        
        /* 訂單表格 */
        .orders-table-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .table-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .search-box {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            width: 250px;
            transition: all 0.2s;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead th {
            text-align: left;
            padding: 12px;
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        tbody td {
            padding: 16px 12px;
            border-bottom: 1px solid #f1f5f9;
            color: #1e293b;
        }
        
        tbody tr:hover {
            background: #f8fafc;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-business {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge-personal {
            background: #f3e8ff;
            color: #6b21a8;
        }
        
        .badge-completed {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-processing {
            background: #fef3c7;
            color: #92400e;
        }
        
        .badge-pending {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* 載入中 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f1f5f9;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 頂部導航 -->
        <div class="header">
            <h1>📦 訂單管理</h1>
            <a href="index.php" class="back-btn">← 返回看板</a>
        </div>
        
        <!-- 時間篩選 -->
        <div class="filters">
            <span class="filter-label">時間範圍：</span>
            <button class="filter-btn active" data-period="all">全部</button>
            <button class="filter-btn" data-period="month">本月</button>
            <button class="filter-btn" data-period="quarter">本季</button>
            <button class="filter-btn" data-period="year">本年度</button>
        </div>
        
        <!-- 統計卡片 -->
        <div class="stats-grid">
            <div class="stat-card" style="--accent-color: #667eea;">
                <div class="stat-label">總訂單數</div>
                <div class="stat-value" id="total-orders">-</div>
                <div class="stat-change">載入中...</div>
            </div>
            
            <div class="stat-card" style="--accent-color: #10b981;">
                <div class="stat-label">總營收</div>
                <div class="stat-value" id="total-revenue">-</div>
                <div class="stat-change">載入中...</div>
            </div>
            
            <div class="stat-card" style="--accent-color: #f59e0b;">
                <div class="stat-label">總客戶數</div>
                <div class="stat-value" id="total-customers">-</div>
                <div class="stat-change">載入中...</div>
            </div>
            
            <div class="stat-card" style="--accent-color: #ec4899;">
                <div class="stat-label">回購率</div>
                <div class="stat-value" id="repeat-rate">-</div>
                <div class="stat-change">載入中...</div>
            </div>
        </div>
        
        <!-- 圖表區塊 -->
        <div class="charts-section">
            <!-- 客戶類型分析 -->
            <div class="chart-card">
                <h3 class="chart-title">客戶類型分析</h3>
                <div class="chart-container">
                    <div class="pie-chart">
                        <svg class="pie-svg" viewBox="0 0 200 200" id="customer-type-chart">
                            <circle cx="100" cy="100" r="80" fill="#e2e8f0" />
                        </svg>
                        <div class="pie-legend" id="customer-type-legend">
                            <div class="loading">載入中...</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 產品排行榜 -->
            <div class="chart-card">
                <h3 class="chart-title">熱銷產品 TOP 10</h3>
                <div class="product-list" id="product-ranking">
                    <div class="loading">載入中...</div>
                </div>
            </div>
        </div>
        
        <!-- 訂單表格 -->
        <div class="orders-table-container">
            <div class="table-header">
                <h3 class="table-title">訂單列表</h3>
                <input type="text" class="search-box" placeholder="搜尋訂單、客戶..." id="search-input">
            </div>
            
            <table id="orders-table">
                <thead>
                    <tr>
                        <th>訂單編號</th>
                        <th>日期</th>
                        <th>客戶</th>
                        <th>類型</th>
                        <th>金額</th>
                        <th>狀態</th>
                    </tr>
                </thead>
                <tbody id="orders-tbody">
                    <tr>
                        <td colspan="6" class="loading">
                            <div class="loading-spinner"></div>
                            <div>載入訂單資料中...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // API 基礎路徑
        const API_BASE = 'orders-api.php';
        
        // 當前篩選條件
        let currentPeriod = 'all';
        let allOrders = [];
        
        // ============================================
        // 初始化
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            setupEventListeners();
        });
        
        // ============================================
        // 設定事件監聽
        // ============================================
        function setupEventListeners() {
            // 時間篩選按鈕
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentPeriod = btn.dataset.period;
                    loadAllData();
                });
            });
            
            // 搜尋框
            document.getElementById('search-input').addEventListener('input', (e) => {
                filterOrders(e.target.value);
            });
        }
        
        // ============================================
        // 載入所有數據
        // ============================================
        async function loadAllData() {
            await Promise.all([
                loadStats(),
                loadOrders(),
                loadProducts()
            ]);
        }
        
        // ============================================
        // 載入統計數據
        // ============================================
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}?action=stats&period=${currentPeriod}`);
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    
                    document.getElementById('total-orders').textContent = data.total_orders.toLocaleString();
                    document.getElementById('total-revenue').textContent = `NT$ ${data.total_revenue.toLocaleString()}`;
                    document.getElementById('total-customers').textContent = data.total_customers.toLocaleString();
                    document.getElementById('repeat-rate').textContent = `${data.repeat_rate}%`;
                    
                    // 繪製客戶類型圓餅圖
                    drawCustomerTypePieChart(data.customer_types);
                }
            } catch (error) {
                console.error('載入統計數據失敗:', error);
            }
        }
        
        // ============================================
        // 載入訂單列表
        // ============================================
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}?action=list&period=${currentPeriod}&limit=100`);
                const result = await response.json();
                
                if (result.success) {
                    allOrders = result.data.orders;
                    renderOrders(allOrders);
                }
            } catch (error) {
                console.error('載入訂單列表失敗:', error);
                document.getElementById('orders-tbody').innerHTML = `
                    <tr><td colspan="6" class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div>載入失敗</div>
                    </td></tr>
                `;
            }
        }
        
        // ============================================
        // 載入產品排行
        // ============================================
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}?action=products&period=${currentPeriod}`);
                const result = await response.json();
                
                if (result.success) {
                    renderProducts(result.data.slice(0, 10));
                }
            } catch (error) {
                console.error('載入產品排行失敗:', error);
            }
        }
        
        // ============================================
        // 渲染訂單列表
        // ============================================
        function renderOrders(orders) {
            const tbody = document.getElementById('orders-tbody');
            
            if (orders.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="6" class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <div>目前沒有訂單</div>
                    </td></tr>
                `;
                return;
            }
            
            tbody.innerHTML = orders.map(order => {
                const statusMap = {
                    'wc-completed': { text: '已完成', class: 'completed' },
                    'wc-processing': { text: '處理中', class: 'processing' },
                    'wc-pending': { text: '待付款', class: 'pending' }
                };
                
                const status = statusMap[order.order_status] || { text: order.order_status, class: 'pending' };
                
                return `
                    <tr>
                        <td>#${order.order_id}</td>
                        <td>${new Date(order.order_date).toLocaleDateString('zh-TW')}</td>
                        <td>
                            <div>${order.customer_name || '訪客'}</div>
                            ${order.company ? `<small style="color: #64748b;">${order.company}</small>` : ''}
                        </td>
                        <td><span class="badge badge-${order.customer_type}">${order.customer_type === 'business' ? '法人' : '個人'}</span></td>
                        <td style="font-weight: 600;">NT$ ${order.total.toLocaleString()}</td>
                        <td><span class="badge badge-${status.class}">${status.text}</span></td>
                    </tr>
                `;
            }).join('');
        }
        
        // ============================================
        // 渲染產品排行
        // ============================================
        function renderProducts(products) {
            const container = document.getElementById('product-ranking');
            
            if (products.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div>目前沒有銷售數據</div></div>';
                return;
            }
            
            container.innerHTML = products.map((product, index) => `
                <div class="product-item">
                    <div class="product-rank">${index + 1}</div>
                    <div class="product-name">${product.product_name}</div>
                    <div class="product-stats">
                        <div class="product-qty">數量: ${product.quantity}</div>
                        <div class="product-revenue">NT$ ${product.revenue.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ============================================
        // 繪製客戶類型圓餅圖
        // ============================================
        function drawCustomerTypePieChart(data) {
            const total = data.business.count + data.personal.count;
            
            if (total === 0) {
                document.getElementById('customer-type-legend').innerHTML = '<div class="empty-state">暫無數據</div>';
                return;
            }
            
            const businessPercent = (data.business.count / total) * 100;
            const personalPercent = (data.personal.count / total) * 100;
            
            // 繪製圓餅圖
            const svg = document.getElementById('customer-type-chart');
            const businessAngle = (businessPercent / 100) * 360;
            
            svg.innerHTML = `
                <circle cx="100" cy="100" r="80" fill="#3b82f6" />
                ${businessAngle < 360 ? `
                    <path d="M 100 100 L 100 20 A 80 80 0 ${businessAngle > 180 ? 1 : 0} 1 ${100 + 80 * Math.sin(businessAngle * Math.PI / 180)} ${100 - 80 * Math.cos(businessAngle * Math.PI / 180)} Z" fill="#a855f7" />
                ` : ''}
            `;
            
            // 更新圖例
            document.getElementById('customer-type-legend').innerHTML = `
                <div class="legend-item">
                    <div class="legend-color" style="background: #3b82f6;"></div>
                    <div class="legend-label">法人客戶</div>
                    <div class="legend-value">${businessPercent.toFixed(1)}%</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #a855f7;"></div>
                    <div class="legend-label">個人客戶</div>
                    <div class="legend-value">${personalPercent.toFixed(1)}%</div>
                </div>
            `;
        }
        
        // ============================================
        // 搜尋過濾
        // ============================================
        function filterOrders(keyword) {
            if (!keyword) {
                renderOrders(allOrders);
                return;
            }
            
            const filtered = allOrders.filter(order => {
                return order.order_id.toString().includes(keyword) ||
                       (order.customer_name && order.customer_name.toLowerCase().includes(keyword.toLowerCase())) ||
                       (order.company && order.company.toLowerCase().includes(keyword.toLowerCase()));
            });
            
            renderOrders(filtered);
        }
    </script>
</body>
</html>
