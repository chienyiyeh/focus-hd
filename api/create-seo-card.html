<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增專注卡片</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        button:hover {
            opacity: 0.9;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 新增專注卡片</h1>
        <p><strong>卡片標題:</strong> SEO 智能分析系統開發</p>
        
        <button onclick="createCard()">🚀 建立卡片</button>
        
        <div id="status"></div>
    </div>
    
    <script>
        async function createCard() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="loading">建立中...</div>';
            
            const formData = new FormData();
            formData.append('action', 'save');
            formData.append('col', 'focus');
            formData.append('title', 'SEO 智能分析系統開發');
            formData.append('project', 'custom_1774756965777');
            formData.append('priority', 'urgent_important');
            formData.append('summary', '完整的產品 SEO 分析與優化系統');
            formData.append('nextStep', '階段 1: 產品掃描功能開發');
            formData.append('body', `<h3>📊 系統目標</h3>
<p>建立智能 SEO 分析系統，實現：</p>
<ul>
<li>✅ 自動掃描 WooCommerce 產品</li>
<li>✅ 分析現有標題、描述、Meta</li>
<li>✅ 關鍵字排名追蹤</li>
<li>✅ AI 優化建議生成</li>
<li>✅ 預測優化效果與 ROI</li>
</ul>

<h3>🎯 開發階段</h3>
<p><strong>階段 1: 產品掃描功能</strong> (30分鐘)</p>
<ul>
<li>讀取所有產品</li>
<li>分析 SEO 狀況</li>
<li>儲存分析結果</li>
</ul>

<p><strong>階段 2: SEO 資料表建立</strong> (20分鐘)</p>
<ul>
<li>seo_keywords 表</li>
<li>seo_tracking 表</li>
<li>seo_analysis 表</li>
</ul>

<p><strong>階段 3: Google Search Console 串接</strong> (1.5小時)</p>
<ul>
<li>API 授權設定</li>
<li>讀取排名數據</li>
<li>歷史追蹤</li>
</ul>

<p><strong>階段 4: AI 分析引擎</strong> (1.5小時)</p>
<ul>
<li>關鍵字提取</li>
<li>優化建議生成</li>
<li>排名預測</li>
</ul>

<p><strong>階段 5: 前端介面</strong> (2小時)</p>
<ul>
<li>SEO 戰情室儀表板</li>
<li>產品分析頁面</li>
<li>批次操作介面</li>
</ul>

<h3>💰 預期效益</h3>
<ul>
<li>節省 SEO 分析時間: 80%</li>
<li>提升優化準確度: 50%</li>
<li>預估流量提升: 25-40%</li>
<li>預估訂單提升: 15-25%</li>
</ul>

<h3>📋 技術架構</h3>
<ul>
<li>WooCommerce REST API (已串接 ✅)</li>
<li>Google Search Console API</li>
<li>Gemini AI (已串接 ✅)</li>
<li>PHP + MySQL</li>
</ul>`);
            formData.append('checklist', JSON.stringify([
                { text: '產品掃描功能', checked: false },
                { text: 'SEO 資料表建立', checked: false },
                { text: 'Google Search Console 串接', checked: false },
                { text: 'AI 分析引擎', checked: false },
                { text: '前端介面開發', checked: false },
                { text: '測試與上線', checked: false }
            ]));
            formData.append('isPrivate', '1');
            
            try {
                const response = await fetch('https://phpstack-1553960-6296402.cloudwaysapps.com/api/cards.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusDiv.innerHTML = `
                        <div class="success">
                            ✅ 卡片建立成功！<br>
                            卡片 ID: ${result.data?.id || '已建立'}<br><br>
                            <a href="https://phpstack-1553960-6296402.cloudwaysapps.com/" target="_blank">
                                前往看板查看
                            </a>
                        </div>
                    `;
                } else {
                    statusDiv.innerHTML = `
                        <div class="error">
                            ❌ 建立失敗: ${result.error || '未知錯誤'}<br><br>
                            可能原因: 需要先登入系統<br>
                            請先到 <a href="https://phpstack-1553960-6296402.cloudwaysapps.com/login.php" target="_blank">登入頁面</a> 登入
                        </div>
                    `;
                }
                
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="error">
                        ❌ 發生錯誤: ${error.message}<br><br>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
